

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}


<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

<div class="card p-4 shadow" style="width:400px;">
    <h3 class="text-center mb-4">Create Account</h3>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
        <input type="password" name="password1" class="form-control mb-3" placeholder="Password" required>
        <input type="password" name="password2" class="form-control mb-3" placeholder="Confirm Password" required>
        <button type="submit" class="btn btn-warning w-100">Signup</button>
    </form>

    <div class="mt-3 text-center">
        <a href="{% url 'login' %}">Back to Login</a>
    </div>
</div>

</body>
</html>
